general {
    no_fade_in = false
    grace = 0
    disable_loading = false
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot      # 擷取你現在的桌面
    blur_passes = 3        # 3 層模糊，純粹的 Liquid Glass 底底
    blur_size = 8
    color = rgba(0, 0, 0, 0.5) # 稍微壓暗背景，讓白字浮出來
}

# ==========================================
# 直立時鐘：上半部 (小時)
# ==========================================
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H")</b>"
    color = rgba(255, 255, 255, 0.9) # 接近純白，字體銳利
    font_size = 140
    font_family = JetBrainsMono Nerd Font # 也可以換成你喜歡的無襯線字體
    position = 0, 80       # 往上推
    halign = center
    valign = center
    shadow_passes = 0      # 拒絕任何 3D 陰影，維持 Absolute Flat
}

# ==========================================
# 直立時鐘：下半部 (分鐘)
# ==========================================
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%M")</b>"
    color = rgba(255, 255, 255, 0.4) # 分鐘調成半透明，做出液態層次感
    font_size = 140
    font_family = JetBrainsMono Nerd Font
    position = 0, -80      # 往下推，跟小時完美對齊
    halign = center
    valign = center
    shadow_passes = 0
}

# ==========================================
# 隱形密碼框 (敲擊鍵盤才出現)
# ==========================================
input-field {
    monitor =
    size = 280, 50         # 一個修長的平整框框
    outline_thickness = 0  # 絕對無邊框
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    
    # 這裡就是魔法：平常透明，輸入時才有淡淡的玻璃底色
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    
    # 動態回饋
    check_color = rgba(255, 255, 255, 0.3)
    fail_color = rgba(255, 100, 100, 0.5)

    # 關鍵參數：沒打字時完全隱藏！
    fade_on_empty = true   
    placeholder_text =     # 留空，不要任何提示文字
    hide_input = false
    
    position = 0, -280     # 放在時鐘的下方
    halign = center
    valign = center
}
