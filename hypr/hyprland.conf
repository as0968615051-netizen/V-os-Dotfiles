# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
exec-once = ~/.local/bin/startup_sound.sh
exec-once = sleep 3 && fcitx5 -d --replace
exec-once = sleep 1 && [ -f "/home/oko/.theme/.current_wallpaper" ] && /usr/bin/swaybg -i $(cat /home/oko/.theme/.current_wallpaper) -m fill &
env = QT_IM_MODULE, fcitx
env = XMODIFIERS, @im=fcitx
env = GTK_IM_MODULE, fcitx
env = SDL_IM_MODULE, fcitx
env = INPUT_METHOD, fcitx

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################
source = ~/.config/hypr/monitor.conf
# See https://wiki.hypr.land/Configuring/Monitors/



###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
source = ~/.config/hypr/variables.conf 

#################
### AUTOSTART ###
#################
exec-once = hypridle &
exec-once = waybar
exec-once = makoctl restore
exec-once = mako -c ~/.config/mako/config
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
#############################
### ENVIRONMENT VARIABLES ###
#############################
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprhist daemon focus
exec-once = iio-sensor-proxy
exec-once = wl-rotator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-mocha-lavender-standard+default"
# See https://wiki.hypr.land/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = LANG,zh_TW.UTF-8
env = LANGUAGE,zh_TW:en_US
env = LC_ALL,zh_TW.UTF-8
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = ADW_DISABLE_PORTAL,1

###################
### PERMISSIONS ###
###################

